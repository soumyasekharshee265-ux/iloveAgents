pull_request_rules:
  # ── Auto-merge Dependabot PRs when both build and CodeRabbit pass
  - name: Auto-merge Dependabot PRs
    conditions:
      - author = dependabot[bot]
      - check-success = build
      - check-success = CodeRabbit
    actions:
      merge:
        method: squash

  # ── Block merge and request changes when build check fails
  - name: Block merge when build fails
    conditions:
      - check-failure = build
      - "-author = dependabot[bot]"
    actions:
      review:
        type: REQUEST_CHANGES
        message: |
          ❌ Build is failing on this PR.
          Please fix before merging:
          1. Run `npm run build` locally
          2. Fix any errors shown
          3. Push your fix — the check will re-run automatically
          Most common issue: broken registry import.
          Replace:
          import agents from '../agents/registry'
          With:
          import { useAgents } from '../lib/useAgents'
          const { agents } = useAgents()
          See CONTRIBUTING.md for help. 🙏

  # ── Comment when CodeRabbit requests changes
  - name: Comment when CodeRabbit requests changes
    conditions:
      - check-failure = CodeRabbit
    actions:
      comment:
        message: |
          👋 Hey! CodeRabbit found issues in this PR that need to be fixed before merging.
          Please:
          1. Scroll up and read the CodeRabbit comments carefully
          2. Click the "Proposed fix" links to see exactly what to change
          3. Apply the fixes and push your changes
          4. The PR will be re-reviewed automatically
          Thank you for contributing to iloveAgents! 🚀

  # ── Auto-label PRs that add or modify agent definitions
  - name: Auto-label new agents
    conditions:
      - "files~=^src/agents/"
    actions:
      label:
        add:
          - "new agent"

  # ── Auto-label PRs whose title starts with fix
  - name: Auto-label bug fixes
    conditions:
      - "title~=^fix"
    actions:
      label:
        add:
          - "bug fix"

  # ── Auto-label PRs that touch UI components
  - name: Auto-label UI changes
    conditions:
      - "files~=^src/components/"
    actions:
      label:
        add:
          - "UI"

  # ── Auto-label Dependabot PRs
  - name: Auto-label dependencies
    conditions:
      - author = dependabot[bot]
    actions:
      label:
        add:
          - "dependencies"
          - "automated"

  # ── Close PRs with empty description (skip bots)
  - name: Close PRs with no description
    conditions:
      - "body~=^\\s*$"
      - "-author = dependabot[bot]"
      - "-author = coderabbitai[bot]"
    actions:
      close:
        message: |
          👋 Hi! Thanks for your contribution to iloveAgents!
          This PR was closed because it has no description.
          Please reopen it with:
          ✅ What this PR does
          ✅ Screenshots if UI change
          ✅ Confirmation that npm run build passes locally
          See CONTRIBUTING.md for the full guide.

  # ── Warn when branch is out of date with main (skip bots and drafts)
  - name: Warn when branch is out of date
    conditions:
      - "-linear-history"
      - "-draft"
      - "-author = dependabot[bot]"
    actions:
      comment:
        message: |
          ⚠️ This branch is out of date with main.
          Please click "Update branch" to sync before merging.

  # ── Welcome message for first-time contributors (skip bots)
  - name: Welcome first time contributors
    conditions:
      - "author != dependabot[bot]"
      - "author != coderabbitai[bot]"
      - "number = 1"
    actions:
      comment:
        message: |
          👋 Welcome to iloveAgents! Thanks for your first contribution!
          While you wait for review:
          ✅ Make sure npm run build passes locally
          ✅ Test your changes in the browser
          ✅ Check CodeRabbit comments above for any issues
          We appreciate you! 🚀❤️
